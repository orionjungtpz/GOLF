<script>
    // [JavaScript: 로직 업그레이드]

    // 페이지 로드 시 초기 렌더링
    window.onload = function() {
        performDraw(false);
    };

    function performDraw(shuffleFlag) {
        // 1. 입력 데이터 가져오기
        const title = document.getElementById('event-title').value;
        const dateInput = document.getElementById('event-date').value;
        const venue = document.getElementById('event-venue').value;
        const playersString = document.getElementById('player-list').value;

        // 2. 입력 데이터 파싱
        const players = playersString.split(/[\s,]+/).filter(name => name.trim() !== "");
        if (shuffleFlag) {
            shuffleArray(players);
        }

        // 3. 포스터 고정 영역 업데이트 (타이틀, 날짜, 장소)
        document.getElementById('poster-title-rendered').innerText = title;
        document.getElementById('poster-date').innerText = formatDate(dateInput);
        document.getElementById('poster-venue').innerText = venue;

        // 4. 조 편성 카드 생성
        const posterMain = document.getElementById('poster-main');
        posterMain.innerHTML = ""; // 기존 카드 초기화

        // 4명씩 조를 나눔 (최대 3조)
        const groupsData = [
            { id: 1, time: "07:30 AM", players: players.slice(0, 4) },
            { id: 2, time: "07:40 AM", players: players.slice(4, 8) },
            { id: 3, time: "07:50 AM", players: players.slice(8, 12) }
        ];

        // 데이터가 있는 조만 렌더링
        groupsData.forEach(group => {
            if (group.players.length > 0) {
                const cardHtml = createGroupCard(group);
                posterMain.innerHTML += cardHtml;
            }
        });
    }

    function createGroupCard(group) {
        let playerRowsHtml = "";
        group.players.forEach((playerName, index) => {
            playerRowsHtml += `
                <div class="player-row">
                    <div class="player-num">${index + 1}</div>
                    <div class="player-name">${playerName}</div>
                    <div class="player-icon">MG</div>
                </div>
            `;
        });

        // 4명 미만인 경우 빈 행 추가
        for (let i = group.players.length; i < 4; i++) {
             playerRowsHtml += `
                <div class="player-row">
                    <div class="player-num">${i + 1}가능합니다. 현재 사용하시는 HTML 파일의 코드를 수정하여, 이전에 보여드렸던 고급스러운 PGA 투어 포스터 스타일을 기본 배경이자 전체적인 고정 디자인으로 적용할 수 있습니다.

이를 위해, 기존의 단순한 표/리스트 형태의 출력 부분을 복잡한 카드 형태의 CSS 레이아웃으로 변경하고, PGA 스타일의 이미지를 CSS 배경으로 설정하는 새로운 HTML 및 CSS 코드를 제공해 드리겠습니다. 또한, 기존의 기능(랜덤 섞기 등)은 그대로 유지되도록 JavaScript 로직을 업그레이드하겠습니다.

        /* 상단 로고 및 타이틀 섹션 */
        #poster-header {
            width: 100%;
            text-align: center;
            padding: 30px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .main-logo-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .custom-logo {
            width: 150px;
            height: auto;
        }

        .stars {
            display: flex;
            gap: 5px;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .star {
            color: #f7b731;
            font-size: 14px;
        }

        #poster-header h1 {
            font-size: 32px;
            font-weight: bold;
            color: #d8c39e;
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        #poster-header h2 {
            font-size: 18px;
            font-weight: normal;
            color: #ffffff;
            margin: 5px 0 10px 0;
            opacity: 0.9;
        }

        #event-details {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
            font-weight: 300;
        }

        /* 중앙 조 편성 카드 섹션 */
        #poster-main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 0 40px;
            margin-top: 20px;
            z-index: 1;
        }

        .group-card {
            flex: 1;
            max-width: 280px;
            background: rgba(30, 40, 60, 0.9); /* 반투명 어두운 배경 */
            border: 1px solid rgba(216, 195, 158, 0.4);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card-header {
            width: 100%;
            background: #f7b731; /* 그룹명 배경색 고정 */
            color: #1e283c;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
        }

        .card-time {
            font-size: 14px;
            opacity: 0.8;
        }

        .card-body {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .player-row {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-row:last-child {
            border-bottom: none;
        }

        .player-num {
            width: 30px;
            font-weight: bold;
            color: #d8c39e;
        }

        .player-name {
            flex: 1;
            color: white;
            font-weight: normal;
        }

        .player-icon {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            font-weight: bold;
        }

        /* 하단 푸터 섹션 */
        #poster-footer {
            width: 100%;
            text-align: center;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            opacity: 0.6;
            margin-top: 10px;
            z-index: 1;
        }

        .footer-logo {
            width: 80px;
            height: auto;
        }

    </style>
</head>

<script>
    // [JavaScript: 로직 업그레이드]

    // 페이지 로드 시 초기 렌더링
    window.onload = function() {
        performDraw(false);
    };

    function performDraw(shuffleFlag) {
        // 1. 입력 데이터 가져오기
        const title = document.getElementById('event-title').value;
        const dateInput = document.getElementById('event-date').value;
        const venue = document.getElementById('event-venue').value;
        const playersString = document.getElementById('player-list').value;

        // 2. 입력 데이터 파싱
        const players = playersString.split(/[\s,]+/).filter(name => name.trim() !== "");
        if (shuffleFlag) {
            shuffleArray(players);
        }

        // 3. 포스터 고정 영역 업데이트 (타이틀, 날짜, 장소)
        document.getElementById('poster-title-rendered').innerText = title;
        document.getElementById('poster-date').innerText = formatDate(dateInput);
        document.getElementById('poster-venue').innerText = venue;

        // 4. 조 편성 카드 생성
        const posterMain = document.getElementById('poster-main');
        posterMain.innerHTML = ""; // 기존 카드 초기화

        // 4명씩 조를 나눔 (최대 3조)
        const groupsData = [
            { id: 1, time: "07:30 AM", players: players.slice(0, 4) },
            { id: 2, time: "07:40 AM", players: players.slice(4, 8) },
            { id: 3, time: "07:50 AM", players: players.slice(8, 12) }
        ];

        // 데이터가 있는 조만 렌더링
        groupsData.forEach(group => {
            if (group.players.length > 0) {
                const cardHtml = createGroupCard(group);
                posterMain.innerHTML += cardHtml;
            }
        });
    }

    function createGroupCard(group) {
        let playerRowsHtml = "";
        group.players.forEach((playerName, index) => {
            playerRowsHtml += `
                <div class="player-row">
                    <div class="player-num">${index + 1}</div>
                    <div class="player-name">${playerName}</div>
                    <div class="player-icon">MG</div>
                </div>
            `;
        });

        // 4명 미만인 경우 빈 행 추가
        for (let i = group.players.length; i < 4; i++) {
             playerRowsHtml += `
                <div class="player-row" style="opacity: 0.3;">
                    <div class="player-num">${i + 1}</div>
                    <div class="player-name">(비어있음)</div>
                    <div class="player-icon">MG</div>
                </div>
            `;
        }

        const cardHtml = `
            <div class="group-card">
                <div class="card-header">
                    <div class="card-title">GROUP ${group.id}</div>
                    <div class="card-time">1H · ${group.time}</div>
                </div>
                <div class="card-body">
                    ${playerRowsHtml}
                </div>
            </div>
        `;
        return cardHtml;
    }

    // 배열 랜덤 섞기 함수
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // 날짜 포맷 함수 (YYYY-MM-DD -> YYYY.MM.DD)
    function formatDate(dateString) {
        if (!dateString) return "YYYY.MM.DD";
        return dateString.replace(/-/g, '.');
    }
</script>
